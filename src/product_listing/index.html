<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Home</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script type="module" src="../js/product-listing.js"></script>
  </head>

  <body>
    <header class="divider">
      <div class="logo">
        <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
        <a href="./index.html"> Sleep<span class="highlight">Outside</span></a>
      </div>
      <div class="cart">
        <a href="./cart/index.html">
          <img src="/images/noun_Backpack_65884.svg" alt="logo" />
          <span class="cart-count">0</span>
        </a>
      </div>
    </header>
    <main class="divider">
      <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="/images/banner-sm.jpg 500w, /images/banner.jpg 1000w"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>
      <section class="categories">
        <h2>Shop by Category</h2>
        <div class="category-grid">
          <a href="/category/index.html?category=tents" class="category-card">
            <img
              src="https://byui-cse.github.io/wdd330-ww-course/images/category-tents.svg"
              alt="Tents"
            />
            <p>Tents</p>
          </a>

          <a
            href="/category/index.html?category=backpacks"
            class="category-card"
          >
            <img
              src="https://byui-cse.github.io/wdd330-ww-course/images/category-backpacks.svg"
              alt="Backpacks"
            />
            <p>Backpacks</p>
          </a>

          <a
            href="/category/index.html?category=sleeping-bags"
            class="category-card"
          >
            <img
              src="https://byui-cse.github.io/wdd330-ww-course/images/category-sleepingbags.svg"
              alt="Sleeping Bags"
            />
            <p>Sleeping Bags</p>
          </a>

          <a
            href="/category/index.html?category=hammocks"
            class="category-card"
          >
            <img
              src="https://byui-cse.github.io/wdd330-ww-course/images/category-hammocks.svg"
              alt="Hammocks"
            />
            <p>Hammocks</p>
          </a>
        </div>
      </section>
    </main>
    <footer>
      &copy;2025 ⛺ SleepOutside ⛺ WDD 330 ⛺ BYU-Idaho for BYU-Pathway
      Worldwide Online
    </footer>
  </body>
</html>
